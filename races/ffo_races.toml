# FFO race catalog (test): child-race mappings + appearance customization for
# the present furry races. A child-race NPC (HumanChildRace) furrified to a
# race here is mapped to its child variant; a race with no child_race leaves
# child NPCs un-furrified.
#
# weight_range = [[thin lo,hi],[musc lo,hi],[fat lo,hi]] (0-100) remaps MWGT.
# EYEBROWS/FACIAL_HAIR/etc = probability, or {probability=, headpart=[...]}.

# Breeds: visual flavors of a parent race (engine RACE unchanged; a breed only
# narrows the horns/colors/weight an NPC gets). When an NPC is furrified to a
# parent race, ONE breed is rolled by these weights, deterministically per NPC;
# if the weights for a parent sum < 1.0 the remainder is the breed-less base
# race. `breed` must match a [[race_customization]] row (+ its color scheme);
# `race` is the parent RACE EditorID. (Top-level key — must precede the first
# table header below.)
breeds = [
  # Deer — every deer is one of these.
  {breed = "DikdikBreed",    race = "FFODeerRace", probability = 0.10},
  {breed = "ElkBreed",       race = "FFODeerRace", probability = 0.15},
  {breed = "GazelleBreed",   race = "FFODeerRace", probability = 0.10},
  {breed = "GoatBreed",      race = "FFODeerRace", probability = 0.10},
  {breed = "MooseBreed",     race = "FFODeerRace", probability = 0.15},
  {breed = "ReindeerBreed",  race = "FFODeerRace", probability = 0.20},
  {breed = "WhiteTailBreed", race = "FFODeerRace", probability = 0.20},
  # Fox — a few are fennecs.
  {breed = "RedFoxBreed",    race = "FFOFoxRace",  probability = 0.90},
  {breed = "FennecBreed",    race = "FFOFoxRace",  probability = 0.10},
]

# Tint categories (file-scoped). A category groups tint-layer (TTGP) names by
# case-insensitive glob; a literal matches that exact layer. A color-scheme key
# (or, with no scheme, these in order at a ~65% gate) resolves to a category ->
# ONE random matching layer; a key that isn't a category is an exact layer name
# -> just that layer. So `Mask = [["probability", 1.0]]` always applies one of
# the masks at random; `"Face Mask 2" = [...]` applies only that one.
# Chargen-only layers (Lip Color, Paint, Scar, Old) are intentionally not
# categories — reference them by exact name if you ever want them.
[tint_categories]
"Skin Tone"         = ["Skin tone"]
Mask                = ["Face Mask *", "Face Plate", "Mask", "Eye Stripe", "Eye Tear", "White Face"]
Muzzle              = ["Muzzle", "Muzzle Small", "Cougar White"]
Muzzle_Stripe       = ["Muzzle Stripe", "Muzzle Upper", "Muzzle Side", "Mouche", "Nose Stripe*"]
Chin                = ["Chin", "Lower Jaw"]
Ear                 = ["Ears"]
Eyebrow             = ["Eyebrow", "Eyebrow Spot"]
Forehead            = ["Forehead", "Blaze *", "Cap", "Head Scales", "Star", "Upper Head"]
Eyeliner            = ["Eyeliner", "Eye Shadow", "Eye Socket"]
"Eyesocket Lower"   = ["Eye Lower"]
"Eyesocket Upper"   = ["Eye Upper", "Eye Socket Upper"]
"Cheek Color Lower" = ["Cheek Color Lower"]
"Cheek Color"       = ["Cheek Color", "Cheeks", "White Face 0*"]
Nose                = ["Nose", "Nose Color"]
Tiger_Face          = ["White Face 01", "White Face 02", "White Face 03", ]
Tiger_Stripes       = ["Stripes 01", "Stripes 02", "Stripes 03" ]

####### Cheetah #######

[[race_customization]]
race = "FFOCheetahRace"
child_race = "FFOCheetahChildRace"
# Cheetahs are lean: thin-leaning, low muscle, low fat.
weight_range = [[40, 100], [0, 60], [0, 30]]

