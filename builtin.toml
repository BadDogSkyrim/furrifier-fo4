# Built-in NPC classification for Fallout 4, translated faithfully from
# BadDog"s FFO Furrifier (BDAssetLoaderFO4.pas GetNPCClass). These are
# base-game facts: which class an NPC belongs to. Schemes assign furry
# races to classes; they rarely need to touch this file.
#
# Rows are [CLASS, FIELD, PATTERN], evaluated top-to-bottom, first match
# wins. FIELD is RACE / FACTION / EDITORID / NAME. "*" wildcards the
# start and/or end. Matching is case-insensitive. Only Human/Ghoul-race
# NPCs are ever classified (the candidate gate); the trailing HumanRace
# rows act as the default class.

class_match = [
    ["CLASS_GHOUL", "RACE", "GhoulRace"],
    ["CLASS_ATOM", "FACTION", "ChildrenOfAtomFaction"],
    ["CLASS_BOS", "FACTION", "BrotherhoodofSteelFaction"],
    ["CLASS_DISCIPLES", "EDITORID", "*GangDisciple*"],
    ["CLASS_DISCIPLES", "FACTION", "DLC04GangDisciplesFaction"],
    ["CLASS_FARHARBOR", "EDITORID", "*FarHarbor*"],
    ["CLASS_FARHARBOR", "FACTION", "DLC03SettlementFarHarborFaction"],
    ["CLASS_FARHARBOR", "FACTION", "DLC03WorkshopDialogueFaction"],
    ["CLASS_GUNNER", "EDITORID", "*Gunner*"],
    ["CLASS_INSTITUTE", "EDITORID", "*Institute*"],
    ["CLASS_INSTITUTE", "FACTION", "InstituteFaction"],
    ["CLASS_MINUTEMEN", "EDITORID", "*Minutemen*"],
    ["CLASS_MINUTEMEN", "FACTION", "MinutemenFaction"],
    ["CLASS_OPERATOR", "EDITORID", "*GangOperator*"],
    ["CLASS_OPERATOR", "FACTION", "DLC04GangOperatorsFaction"],
    ["CLASS_PACK", "EDITORID", "*GangPack*"],
    ["CLASS_PACK", "FACTION", "DLC04GangPackFaction"],
    ["CLASS_RAIDER", "EDITORID", "*raider*"],
    ["CLASS_RAIDER", "FACTION", "RaiderFaction"],
    ["CLASS_RAIDER", "FACTION", "TheForgedFaction"],
    ["CLASS_RR", "FACTION", "RailroadFaction"],
    ["CLASS_SETTLER", "NAME", "Settler"],
    ["CLASS_TRAPPER", "FACTION", "DLC03TrapperFaction"],
    ["CLASS_SETTLER", "RACE", "HumanRace"],
]

